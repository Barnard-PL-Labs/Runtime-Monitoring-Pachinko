; PlatformIO Project Configuration for RTLola ESP32 Monitors
;
; This project automatically compiles .lola specifications to C code
; before building the firmware.
;
; USAGE:
;   Single-core (simple):     pio run -e esp32dev -t upload
;   Dual-core (pedagogical):  pio run -e esp32dev-dualcore -t upload
;   Pachinko sensors:         pio run -e esp32dev-pachinko -t upload
;
; The pre-build script will:
;   - Find all .lola files in specs/
;   - Compile them using rtlola2c
;   - Adapt them for Arduino/ESP32
;   - Place output in lib/rtlola_monitors/

[platformio]
default_envs = esp32dev

; ============================================================================
; Common settings shared by all environments
; ============================================================================
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/prebuild_rtlola.py
build_flags = 
    -DCORE_DEBUG_LEVEL=3

; ============================================================================
; SINGLE-CORE VERSION (simple, everything in loop())
; Use: pio run -e esp32dev -t upload
; ============================================================================
[env:esp32dev]
board = esp32dev
; Only compile main.cpp
build_src_filter = +<*> -<main_dual_core.cpp> -<main_pachinko.cpp>

; ============================================================================
; DUAL-CORE VERSION (pedagogical, system/monitor separation)
; Use: pio run -e esp32dev-dualcore -t upload
;
; This version demonstrates runtime monitoring concepts:
;   - Core 0 = System Under Test (reads sensors)
;   - Core 1 = Runtime Monitor (runs RTLola)
;   - Queue  = Communication channel between them
; ============================================================================
[env:esp32dev-dualcore]
board = esp32dev
; Only compile main_dual_core.cpp (exclude main.cpp)
build_src_filter = +<*> -<main.cpp> -<main_pachinko.cpp>

; ============================================================================
; PACHINKO VERSION (5 ball sensors with bidirectional monitoring)
; Use: pio run -e esp32dev-pachinko -t upload
;
; Hardware: 5 analog sensors on GPIO 36, 39, 34, 35, 32
; Features: Non-blocking debounce, rising-edge detection, RTLola verification
; ============================================================================
[env:esp32dev-pachinko]
board = esp32dev
build_src_filter = +<*> -<main.cpp> -<main_dual_core.cpp>

[env:esp32-s3]
; Alternative environment for ESP32-S3 boards (has native USB)
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/prebuild_rtlola.py
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[env:esp32-c3]
; Alternative environment for ESP32-C3 boards
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/prebuild_rtlola.py
build_flags = 
    -DCORE_DEBUG_LEVEL=3

